<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:#f8f9fb;color:#1a2740}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatGlow{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 30px rgba(249,193,8,0.4)) drop-shadow(0 0 60px rgba(249,193,8,0.15))}50%{transform:translateY(-12px);filter:drop-shadow(0 0 50px rgba(249,193,8,0.6)) drop-shadow(0 0 100px rgba(249,193,8,0.25))}}
.wrap{max-width:620px;margin:0 auto}
.pill{padding:10px 18px;border-radius:50px;font-size:13.5px;line-height:1.3;border:2px solid #dde1e8;background:#fff;color:#1a2740;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.pill.on{border-color:#00225a;background:#00225a;color:#fff;font-weight:700;box-shadow:0 2px 12px rgba(0,34,90,0.3)}
.pill.on-blue{border-color:#2c42a8;background:#2c42a8;color:#fff;font-weight:700;box-shadow:0 2px 12px rgba(44,66,168,0.3)}
.field-input{width:100%;padding:13px 16px;border-radius:12px;font-size:15px;border:2px solid #dde1e8;color:#1a2740;background:#fff;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s}
.field-input:focus{border-color:#2c42a8;box-shadow:0 0 0 3px rgba(44,66,168,0.12)}
.field-area{resize:vertical;min-height:84px}
.btn-primary{padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#00225a,#2c42a8);color:#fff;transition:all .2s;box-shadow:0 4px 20px rgba(0,34,90,0.25)}
.btn-primary:disabled{background:#e8eaef;color:#7b8aa3;box-shadow:none;cursor:default}
.btn-sec{padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid #dde1e8;background:#fff;color:#1a2740;transition:all .2s}
.btn-gold{padding:16px 52px;border-radius:50px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#f9c108,#e6ab00);color:#00225a;box-shadow:0 4px 24px rgba(249,193,8,0.35)}
.btn-ghost{padding:16px 32px;border-radius:50px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:2px solid rgba(255,255,255,0.15);background:transparent;color:#fff}
.card{background:#fff;border-radius:16px;padding:28px 22px;border:1px solid #e8eaef;box-shadow:0 4px 24px rgba(0,34,90,0.05);animation:fadeUp .4s ease}
.pills-wrap{display:flex;flex-wrap:wrap;gap:8px}
.field-block{margin-bottom:28px;animation:fadeUp .4s ease}
.field-label{display:block;font-size:15px;font-weight:600;color:#1a2740;margin-bottom:8px;line-height:1.4}
.field-sub{margin:-4px 0 10px;font-size:13px;color:#7b8aa3}
.field-note{margin:8px 0 0;font-size:12px;color:#7b8aa3;font-style:italic}
.input-wrap{position:relative}
.input-suf{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#7b8aa3;font-size:13px;font-weight:500}
.recap-section{margin-bottom:28px}
.recap-title{font-size:11px;font-weight:700;color:#00225a;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f9c108}
.recap-item{margin-bottom:8px;font-size:14px;line-height:1.6}
.recap-item strong{font-weight:600;color:#1a2740}
.recap-item span{color:#7b8aa3}
.progress-track{height:4px;border-radius:2px;background:#edf0f5}
.progress-bar{height:4px;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,#9e1b2b,#f9c108,#2c42a8)}
</style>

 psicologici...",n:"Queste informazioni restano tra noi."}],dolori:[{k:"ginocchia",l:"Come stanno le tue ginocchia?",t:"pill",o:["Perfette, nessun problema","Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]},{k:"ginocchia_d",l:"Raccontami cosa succede alle ginocchia",t:"area",ph:"Es. operazione al menisco...",c:{k:"ginocchia",v:["Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]}},{k:"schiena",l:"Come sta la tua schiena?",t:"pill",o:["Perfetta, nessun problema","Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]},{k:"schiena_d",l:"Raccontami cosa succede alla schiena",t:"area",ph:"Es. ernia L4-L5, colpi della strega...",c:{k:"schiena",v:["Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]}},{k:"spalle",l:"Come stanno le tue spalle?",t:"pill",o:["Perfette, nessun problema","Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]},{k:"spalle_d",l:"Raccontami cosa succede alle spalle",t:"area",ph:"Es. tendinite cuffia rotatori...",c:{k:"spalle",v:["Ho avuto problemi in passato ma ora sto bene","Ho fastidio o dolore adesso"]}},{k:"gomiti",l:"Hai mai avuto problemi ai gomiti o ai polsi?",t:"pill",o:["No, nessun problema","Si"]},{k:"gomiti_d",l:"Raccontami cosa succede",t:"area",ph:"Es. gomito del tennista...",c:{k:"gomiti",v:"Si"}},{k:"anche",l:"Hai mai avuto problemi alle anche o alle caviglie?",t:"pill",o:["No, nessun problema","Si"]},{k:"anche_d",l:"Raccontami cosa succede",t:"area",ph:"Es. caviglia debole...",c:{k:"anche",v:"Si"}},{k:"farm_art",l:"Prendi degli antidolorifici o antinfiammatori per le articolazioni?",t:"pill",o:["No, mai","Ogni tanto quando serve","Si, regolarmente"]},{k:"referti",l:"Hai fatto degli esami recenti come lastre, risonanze o ecografie?",t:"pill",o:["No","Si"],n:"Al primo incontro potro darci un occhiata."}]};

let step=0, ans={}, done=false;
const $=id=>document.getElementById(id);
const app=$('app');

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function shouldShow(q){
  if(!q.c)return true;
  const cv=ans[q.c.k];
  if(Array.isArray(q.c.v))return q.c.v.includes(cv);
  return cv===q.c.v;
}

function renderField(q){
  if(!shouldShow(q))return '';
  let h='<div class="field-block">';
  h+=`<label class="field-label">${esc(q.l)}${q.req?'<span style="color:'+RED+';margin-left:3px;font-size:16px">*</span>':''}</label>`;
  if(q.sub)h+=`<p class="field-sub">${esc(q.sub)}</p>`;
  
  if(q.t==='txt'){
    h+=`<div class="input-wrap"><input class="field-input" type="text" data-key="${q.k}" value="${esc(ans[q.k]||'')}" placeholder="${esc(q.ph||'')}" style="${q.suf?'padding-right:55px':''}">`;
    if(q.suf)h+=`<span class="input-suf">${esc(q.suf)}</span>`;
    h+=`</div>`;
  }
  if(q.t==='num'){
    h+=`<div class="input-wrap"><input class="field-input" type="number" data-key="${q.k}" value="${esc(ans[q.k]||'')}" placeholder="${esc(q.ph||'')}" style="${q.suf?'padding-right:55px':''}">`;
    if(q.suf)h+=`<span class="input-suf">${esc(q.suf)}</span>`;
    h+=`</div>`;
  }
  if(q.t==='area'){
    h+=`<textarea class="field-input field-area" data-key="${q.k}" placeholder="${esc(q.ph||'')}" rows="3">${esc(ans[q.k]||'')}</textarea>`;
  }
  if(q.t==='pill'){
    h+=`<div class="pills-wrap">`;
    q.o.forEach(o=>{
      const on=ans[q.k]===o;
      h+=`<button type="button" class="pill${on?' on':''}" data-key="${q.k}" data-val="${esc(o)}">${esc(o)}</button>`;
    });
    h+=`</div>`;
  }
  if(q.t==='multi'){
    h+=`<div class="pills-wrap">`;
    const arr=ans[q.k]||[];
    q.o.forEach(o=>{
      const on=arr.includes(o);
      h+=`<button type="button" class="pill${on?' on-blue':''}" data-key="${q.k}" data-val="${esc(o)}" data-multi="1">${esc(o)}</button>`;
    });
    h+=`</div>`;
  }
  if(q.n)h+=`<p class="field-note">${esc(q.n)}</p>`;
  h+=`</div>`;
  return h;
}

function renderRecap(){
  const groups=[["Chi sei","chi_sei"],["Tu e la palestra","palestra"],["Obiettivi","obiettivi"],["Quando e dove","quando"],["Giornata tipo","vita"],["I tuoi gusti","gusti"],["Salute","salute"],["Articolazioni","dolori"]];
  let h='';
  groups.forEach(([title,id])=>{
    const items=QS[id].filter(q=>shouldShow(q)).filter(q=>{const x=ans[q.k];return x!==undefined&&x!==''&&x!==null&&!(Array.isArray(x)&&!x.length);});
    if(!items.length)return;
    h+=`<div class="recap-section"><div class="recap-title">${esc(title)}</div>`;
    items.forEach(q=>{
      const v=Array.isArray(ans[q.k])?ans[q.k].join(', '):ans[q.k];
      h+=`<div class="recap-item"><strong>${esc(q.l)}</strong><br><span>${esc(v)}</span></div>`;
    });
    h+=`</div>`;
  });
  return h;
}

function exportText(){
  let t="ANAMNESI SUPER-ALE\nData: "+new Date().toLocaleDateString("it-IT")+"\n\n";
  [["CHI SEI","chi_sei"],["PALESTRA","palestra"],["OBIETTIVI","obiettivi"],["LOGISTICA","quando"],["VITA","vita"],["GUSTI","gusti"],["SALUTE","salute"],["DOLORI","dolori"]].forEach(([title,id])=>{
    t+="-- "+title+" --\n";
    QS[id].forEach(q=>{if(!shouldShow(q))return;const x=ans[q.k];if(x!==undefined&&x!==''&&x!==null&&!(Array.isArray(x)&&!x.length))t+=q.l+": "+(Array.isArray(x)?x.join(", "):x)+"\n";});
    t+="\n";
  });
  return t;
}

function canNext(){
  const sec=SECS[step];
  const qs=QS[sec.id];
  if(!qs)return true;
  return qs.filter(q=>q.req).every(q=>{const x=ans[q.k];return x!==undefined&&x!=='';});
}

function render(){
  const sec=SECS[step];
  const pct=Math.round((step/(SECS.length-1))*100);
  let h='';

  // INTRO
  if(step===0&&!done){
    h+=`<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#152444 0%,${BG1} 55%,#080f1e 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 28px;text-align:center">`;
    h+=`<div style="width:40px;height:3px;border-radius:2px;background:${RED};margin-bottom:36px;opacity:0.8"></div>`;
    h+=`<div style="animation:floatGlow 3s ease-in-out infinite;margin-bottom:40px">${logo(120,true)}</div>`;
    h+=`<div style="font-size:11px;font-weight:700;color:${GOLD};text-transform:uppercase;letter-spacing:0.2em;margin-bottom:16px">Super-Ale</div>`;
    h+=`<h1 style="font-size:28px;font-weight:700;color:${WHITE};margin:0 0 12px;line-height:1.3">Questionario Conoscitivo</h1>`;
    h+=`<div style="width:60px;height:2px;border-radius:1px;background:linear-gradient(90deg,${RED},${GOLD});margin:0 auto 24px"></div>`;
    h+=`<p style="color:rgba(255,255,255,0.55);font-size:15px;margin:0 0 44px;max-width:420px;line-height:1.8">Ciao! Sono Super Ale, il tuo Personal Trainer. Prima di iniziare ho bisogno di conoscerti un po. Piu sei sincero, meglio lavoreremo insieme.</p>`;
    h+=`<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:52px;text-align:left">`;
    [["10-15 minuti","il tempo che ci vuole",RED],["Tutto riservato","le risposte le vedo solo io",BLUE]].forEach(([a,b,c])=>{
      h+=`<div style="display:flex;align-items:center;gap:14px"><div style="width:6px;height:6px;border-radius:3px;background:${c};flex-shrink:0"></div><span style="font-size:14px;color:rgba(255,255,255,0.7)"><strong style="color:${WHITE}">${esc(a)}</strong> -- ${esc(b)}</span></div>`;
    });
    h+=`</div>`;
    h+=`<button class="btn-gold" onclick="goTo(1)">Iniziamo!</button>`;
    h+=`</div>`;
    app.innerHTML=h;
    return;
  }

  // DONE
  if(done){
    h+=`<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#152444 0%,${BG1} 55%,#080f1e 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 28px;text-align:center">`;
    h+=`<div style="width:40px;height:3px;border-radius:2px;background:${RED};margin-bottom:36px;opacity:0.8"></div>`;
    h+=`<div style="animation:floatGlow 3s ease-in-out infinite;margin-bottom:40px">${logo(120,true)}</div>`;
    h+=`<div style="font-size:11px;font-weight:700;color:${GOLD};text-transform:uppercase;letter-spacing:0.2em;margin-bottom:16px">Super-Ale</div>`;
    h+=`<h1 style="font-size:28px;font-weight:700;color:${WHITE};margin:0 0 12px;line-height:1.3">Perfetto, abbiamo finito!</h1>`;
    h+=`<div style="width:60px;height:2px;border-radius:1px;background:linear-gradient(90deg,${RED},${GOLD});margin:0 auto 24px"></div>`;
    h+=`<p style="color:rgba(255,255,255,0.55);font-size:15px;margin:0 0 44px;max-width:420px;line-height:1.8">Grazie per il tuo tempo. Adesso ho tutto quello che mi serve per costruire il programma perfetto per te. Ci vediamo presto in palestra!</p>`;
    h+=`<div style="display:flex;gap:12px"><button class="btn-gold" onclick="copyResults()">Copia le risposte</button><button class="btn-ghost" onclick="resetAll()">Ricomincia</button></div>`;
    h+=`</div>`;
    app.innerHTML=h;
    return;
  }

  // FORM
  const qs=QS[sec.id]||[];
  h+=`<div style="padding:20px 20px 0;display:flex;align-items:center;gap:12px;margin-bottom:8px">`;
  h+=logo(26,false);
  h+=`<div style="flex:1"><div style="font-size:10px;font-weight:700;color:${NAVY};text-transform:uppercase;letter-spacing:0.14em">Super-Ale</div></div>`;
  h+=`<div style="font-size:11px;color:${MUTED};font-weight:600;background:#f0f2f6;padding:5px 14px;border-radius:20px">${step} di ${SECS.length-1}</div>`;
  h+=`</div>`;

  h+=`<div style="padding:12px 20px 0"><div class="progress-track"><div class="progress-bar" style="width:${pct}%"></div></div></div>`;

  h+=`<div style="padding:28px 20px 0"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div style="width:3px;height:24px;border-radius:2px;background:${RED}"></div><h2 style="font-size:24px;font-weight:700;color:${NAVY};margin:0">${esc(sec.t)}</h2></div><p style="color:${MUTED};margin:4px 0 24px 13px;font-size:14px">${esc(sec.s)}</p></div>`;

  h+=`<div style="margin:0 16px" class="card">`;
  if(step===SECS.length-1){
    h+=renderRecap();
  } else {
    qs.forEach(q=>{h+=renderField(q);});
  }
  h+=`</div>`;

  h+=`<div style="display:flex;justify-content:space-between;padding:20px 16px 24px">`;
  if(step>1) h+=`<button class="btn-sec" onclick="goTo(${step-1})">Indietro</button>`; else h+=`<div></div>`;
  if(step===SECS.length-1) h+=`<button class="btn-primary" onclick="submitForm()">Invia le risposte</button>`;
  else h+=`<button class="btn-primary" onclick="goTo(${step+1})"${canNext()?'':' disabled'}>Avanti</button>`;
  h+=`</div>`;

  app.innerHTML=h;
  bindEvents();
}

function bindEvents(){
  app.querySelectorAll('input[data-key],textarea[data-key]').forEach(el=>{
    el.addEventListener('input',()=>{ans[el.dataset.key]=el.value;render();});
  });
  app.querySelectorAll('.pill[data-key]').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.key, v=el.dataset.val;
      if(el.dataset.multi){
        let arr=ans[k]||[];
        if(v==='Fisico equilibrato'){ans[k]=arr.includes(v)?[]:[v];}
        else{arr=arr.filter(x=>x!=='Fisico equilibrato');ans[k]=arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];}
      } else {
        ans[k]=v;
      }
      render();
    });
  });
}

window.goTo=function(n){step=n;render();window.scrollTo({top:0,behavior:'smooth'});};
window.submitForm=function(){done=true;render();window.scrollTo({top:0,behavior:'smooth'});};
window.copyResults=function(){
  navigator.clipboard.writeText(exportText()).then(()=>{
    const btn=app.querySelector('.btn-gold');
    if(btn){btn.textContent='Copiato!';setTimeout(()=>{btn.textContent='Copia le risposte';},2500);}
  });
};
window.resetAll=function(){ans={};done=false;step=0;render();window.scrollTo({top:0,behavior:'smooth'});};

render();
</script>
