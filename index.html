.fn{margin:8px 0 0;font-size:12px;color:#7b8aa3;font-style:italic}

function syncAll(){var els=document.querySelectorAll('[data-k]');for(var i=0;i<els.length;i++){var k=els[i].getAttribute('data-k');if(els[i].tagName==='INPUT'||els[i].tagName==='TEXTAREA')ans[k]=els[i].value;}}
function ok(q){if(!q.c)return true;var cv=ans[q.c.k];return q.c.v.indexOf(cv)>=0;}
function updCond(){var els=document.querySelectorAll('[data-cond]');for(var i=0;i<els.length;i++){var ck=els[i].getAttribute('data-ck'),cv=els[i].getAttribute('data-cv').split('||');els[i].style.display=cv.indexOf(ans[ck])>=0?'block':'none';}}

function expTxt(){
  var t="ANAMNESI SUPER-ALE\nData: "+new Date().toLocaleDateString("it-IT")+"\n\n";
  [["CHI SEI","chi_sei"],["PALESTRA","palestra"],["OBIETTIVI","obiettivi"],["LOGISTICA","quando"],["VITA","vita"],["GUSTI","gusti"],["SALUTE","salute"],["DOLORI","dolori"]].forEach(function(g){
    t+="-- "+g[0]+" --\n";QS[g[1]].forEach(function(q){if(!ok(q))return;var x=ans[q.k];if(x&&x!==""&&!(Array.isArray(x)&&x.length===0))t+=q.l+": "+(Array.isArray(x)?x.join(", "):x)+"\n";});t+="\n";
  });return t;
}

function recap(){
  syncAll();
  var gs=[["Chi sei","chi_sei"],["Palestra","palestra"],["Obiettivi","obiettivi"],["Quando e dove","quando"],["Giornata tipo","vita"],["Gusti","gusti"],["Salute","salute"],["Articolazioni","dolori"]];
  var h='';gs.forEach(function(g){var items=QS[g[1]].filter(ok).filter(function(q){var x=ans[q.k];return x&&x!==""&&!(Array.isArray(x)&&x.length===0);});if(!items.length)return;h+='<div class="rs"><div class="rt">'+esc(g[0])+'</div>';items.forEach(function(q){var v=Array.isArray(ans[q.k])?ans[q.k].join(', '):ans[q.k];h+='<div class="ri"><strong>'+esc(q.l)+'</strong><br><span>'+esc(v)+'</span></div>';});h+='</div>';});return h;
}

function mkField(q){
  var wrap=document.createElement('div');wrap.className='fb';
  if(q.c){wrap.setAttribute('data-cond','1');wrap.setAttribute('data-ck',q.c.k);wrap.setAttribute('data-cv',q.c.v.join('||'));wrap.style.display='none';}
  var lbl='<label class="fl">'+esc(q.l)+(q.req?'<span style="color:'+R+';margin-left:3px;font-size:16px">*</span>':'')+'</label>';
  if(q.sub)lbl+='<p class="fs">'+esc(q.sub)+'</p>';
  var inner='';
  if(q.t==='txt'){inner='<div class="iw"><input class="fi" type="text" data-k="'+q.k+'" placeholder="'+esc(q.ph)+'"'+(q.suf?' style="padding-right:55px"':'')+'>'+(q.suf?'<span class="is">'+esc(q.suf)+'</span>':'')+'</div>';}
  else if(q.t==='num'){inner='<div class="iw"><input class="fi" type="number" data-k="'+q.k+'" placeholder="'+esc(q.ph)+'"'+(q.suf?' style="padding-right:55px"':'')+'>'+(q.suf?'<span class="is">'+esc(q.suf)+'</span>':'')+'</div>';}
  else if(q.t==='area'){inner='<textarea class="fi fa" data-k="'+q.k+'" placeholder="'+esc(q.ph)+'" rows="3"></textarea>';}
  else if(q.t==='pill'){inner='<div class="pw" data-pk="'+q.k+'">';q.o.forEach(function(o){inner+='<button type="button" class="pill" data-pk="'+q.k+'" data-pv="'+esc(o)+'">'+esc(o)+'</button>';});inner+='</div>';}
  else if(q.t==='multi'){inner='<div class="pw" data-mk="'+q.k+'">';q.o.forEach(function(o){inner+='<button type="button" class="pill" data-mk="'+q.k+'" data-mv="'+esc(o)+'">'+esc(o)+'</button>';});inner+='</div>';}
  if(q.n)inner+='<p class="fn">'+esc(q.n)+'</p>';
  wrap.innerHTML=lbl+inner;

  // Bind pill clicks directly
  var pills=wrap.querySelectorAll('.pill[data-pk]');
  for(var i=0;i<pills.length;i++){
    pills[i].addEventListener('click',function(){
      var k=this.getAttribute('data-pk'),v=this.getAttribute('data-pv');
      ans[k]=v;
      var all=document.querySelectorAll('.pill[data-pk="'+k+'"]');
      for(var j=0;j<all.length;j++){all[j].className=all[j].getAttribute('data-pv')===v?'pill on':'pill';}
      updCond();
    });
  }
  // Bind multi clicks
  var mpills=wrap.querySelectorAll('.pill[data-mk]');
  for(var i=0;i<mpills.length;i++){
    mpills[i].addEventListener('click',function(){
      var k=this.getAttribute('data-mk'),v=this.getAttribute('data-mv');
      var ar=ans[k]||[];
      if(v==='Fisico equilibrato'){ar=ar.indexOf(v)>=0?[]:[v];}
      else{ar=ar.filter(function(x){return x!=='Fisico equilibrato';});ar=ar.indexOf(v)>=0?ar.filter(function(x){return x!==v;}):[].concat(ar,[v]);}
      ans[k]=ar;
      var all=document.querySelectorAll('.pill[data-mk="'+k+'"]');
      for(var j=0;j<all.length;j++){all[j].className=ans[k].indexOf(all[j].getAttribute('data-mv'))>=0?'pill onb':'pill';}
    });
  }
  // Bind text inputs - just save, no render
  var inputs=wrap.querySelectorAll('input[data-k],textarea[data-k]');
  for(var i=0;i<inputs.length;i++){
    inputs[i].addEventListener('input',function(){ans[this.getAttribute('data-k')]=this.value;});
  }
  return wrap;
}

function showPage(n){
  syncAll();
  step=n;
  var sec=SECS[step];
  app.innerHTML='';

  // INTRO
  if(step===0&&!done){
    app.innerHTML='<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#152444 0%,'+D+' 55%,#080f1e 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 28px;text-align:center"><div style="width:40px;height:3px;border-radius:2px;background:'+R+';margin-bottom:36px;opacity:0.8"></div><div style="animation:floatGlow 3s ease-in-out infinite;margin-bottom:40px">'+lg(120,true)+'</div><div style="font-size:11px;font-weight:700;color:'+G+';text-transform:uppercase;letter-spacing:0.2em;margin-bottom:16px">Super-Ale</div><h1 style="font-size:28px;font-weight:700;color:'+W+';margin:0 0 12px;line-height:1.3">Questionario Conoscitivo</h1><div style="width:60px;height:2px;border-radius:1px;background:linear-gradient(90deg,'+R+','+G+');margin:0 auto 24px"></div><p style="color:rgba(255,255,255,0.55);font-size:15px;margin:0 0 44px;max-width:420px;line-height:1.8">Ciao! Sono Super Ale, il tuo Personal Trainer. Prima di iniziare ho bisogno di conoscerti un po. Piu sei sincero, meglio lavoreremo insieme.</p><div style="display:flex;flex-direction:column;gap:14px;margin-bottom:52px;text-align:left"><div style="display:flex;align-items:center;gap:14px"><div style="width:6px;height:6px;border-radius:3px;background:'+R+'"></div><span style="font-size:14px;color:rgba(255,255,255,0.7)"><strong style="color:'+W+'">10-15 minuti</strong> -- il tempo che ci vuole</span></div><div style="display:flex;align-items:center;gap:14px"><div style="width:6px;height:6px;border-radius:3px;background:'+B+'"></div><span style="font-size:14px;color:rgba(255,255,255,0.7)"><strong style="color:'+W+'">Tutto riservato</strong> -- le risposte le vedo solo io</span></div></div><button class="bg" id="startBtn">Iniziamo!</button></div>';
    document.getElementById('startBtn').addEventListener('click',function(){showPage(1);});
    return;
  }

  // DONE
  if(done){
    app.innerHTML='<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 20%,#152444 0%,'+D+' 55%,#080f1e 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 28px;text-align:center"><div style="width:40px;height:3px;border-radius:2px;background:'+R+';margin-bottom:36px;opacity:0.8"></div><div style="animation:floatGlow 3s ease-in-out infinite;margin-bottom:40px">'+lg(120,true)+'</div><div style="font-size:11px;font-weight:700;color:'+G+';text-transform:uppercase;letter-spacing:0.2em;margin-bottom:16px">Super-Ale</div><h1 style="font-size:28px;font-weight:700;color:'+W+';margin:0 0 12px;line-height:1.3">Perfetto, abbiamo finito!</h1><div style="width:60px;height:2px;border-radius:1px;background:linear-gradient(90deg,'+R+','+G+');margin:0 auto 24px"></div><p style="color:rgba(255,255,255,0.55);font-size:15px;margin:0 0 44px;max-width:420px;line-height:1.8">Grazie per il tuo tempo. Adesso ho tutto per costruire il programma perfetto per te. Ci vediamo presto in palestra!</p><div style="display:flex;gap:12px"><button class="bg" id="copyBtn">Copia le risposte</button><button class="bgh" id="resetBtn">Ricomincia</button></div></div>';
    document.getElementById('copyBtn').addEventListener('click',function(){navigator.clipboard.writeText(expTxt()).then(function(){var b=document.getElementById('copyBtn');b.textContent='Copiato!';setTimeout(function(){b.textContent='Copia le risposte';},2500);});});
    document.getElementById('resetBtn').addEventListener('click',function(){ans={};done=false;showPage(0);});
    return;
  }

  // FORM
  var pct=Math.round((step/(SECS.length-1))*100);
  var header=document.createElement('div');
  header.innerHTML='<div style="padding:20px 20px 0;display:flex;align-items:center;gap:12px;margin-bottom:8px">'+lg(26,false)+'<div style="flex:1"><div style="font-size:10px;font-weight:700;color:'+N+';text-transform:uppercase;letter-spacing:0.14em">Super-Ale</div></div><div style="font-size:11px;color:'+M+';font-weight:600;background:#f0f2f6;padding:5px 14px;border-radius:20px">'+step+' di '+(SECS.length-1)+'</div></div><div style="padding:12px 20px 0"><div class="pt"><div class="pb" style="width:'+pct+'%"></div></div></div><div style="padding:28px 20px 0"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div style="width:3px;height:24px;border-radius:2px;background:'+R+'"></div><h2 style="font-size:24px;font-weight:700;color:'+N+';margin:0">'+esc(sec.t)+'</h2></div><p style="color:'+M+';margin:4px 0 24px 13px;font-size:14px">'+esc(sec.s)+'</p></div>';
  app.appendChild(header);

  var card=document.createElement('div');card.className='card';card.style.margin='0 16px';
  if(step===SECS.length-1){card.innerHTML=recap();}
  else{var qs=QS[sec.id]||[];qs.forEach(function(q){card.appendChild(mkField(q));});}
  app.appendChild(card);

  // Update conditional fields
  updCond();

  // Nav
  var nav=document.createElement('div');nav.style.cssText='display:flex;justify-content:space-between;padding:20px 16px 24px';
  if(step>1){var bb=document.createElement('button');bb.className='bs';bb.textContent='Indietro';bb.addEventListener('click',function(){showPage(step-1);});nav.appendChild(bb);}else{nav.appendChild(document.createElement('div'));}
  var bf=document.createElement('button');bf.className='bp';
  if(step===SECS.length-1){bf.textContent='Invia le risposte';bf.addEventListener('click',function(){syncAll();bf.textContent='Invio in corso...';bf.disabled=true;try{fetch('https://script.google.com/macros/s/AKfycbx2WaJLh3HgW6rIEX6EN2cC9bJgAvbB6PnrSdh_vwaGKboPuNk-4nYT4WtjuHVHUu_T/exec',{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(ans)}).then(function(){done=true;showPage(0);window.scrollTo({top:0,behavior:'smooth'});}).catch(function(){done=true;showPage(0);window.scrollTo({top:0,behavior:'smooth'});});}catch(e){done=true;showPage(0);}});}
  else{bf.textContent='Avanti';bf.addEventListener('click',function(){syncAll();var sec2=SECS[step];var qs2=QS[sec2.id]||[];var valid=true;for(var i=0;i<qs2.length;i++){if(qs2[i].req){var x=ans[qs2[i].k];if(!x||x===''){valid=false;break;}}}if(valid){showPage(step+1);window.scrollTo({top:0,behavior:'smooth'});}});}
  nav.appendChild(bf);app.appendChild(nav);
}

showPage(0);
</script>
</body>
</html>
